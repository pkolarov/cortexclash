<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cortex Clash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #game {
    display: block;
    touch-action: none;
    background: #06060f;
  }
</style>
</head>
<body data-screen-label="Cortex Clash">
<canvas id="game" width="1080" height="1920"></canvas>
<div id="tweaks-root"></div>

<script src="game/sound.js"></script>
<script src="game/boards.js"></script>
<script src="game/engine.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="game/net.js"></script>
<script src="game/render.js"></script>
<script src="game/main.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="game/tweaks-panel.jsx"></script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "gameSpeed": 1,
    "castleEnergy": 36,
    "powerEvery": 9,
    "glow": 0.7,
    "scanlines": true
  }/*EDITMODE-END*/;

  function TweaksApp() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(() => {
      Object.assign(window.TWEAKS, {
        speed: t.gameSpeed,
        castleEnergy: t.castleEnergy,
        powerEvery: t.powerEvery,
        glow: t.glow,
        scanlines: t.scanlines,
      });
    }, [t]);
    return (
      <TweaksPanel>
        <TweakSection label="Gameplay" />
        <TweakSlider label="Game speed" value={t.gameSpeed} min={0.5} max={2} step={0.1} unit="x"
                     onChange={(v) => setTweak('gameSpeed', v)} />
        <TweakSlider label="Castle energy" value={t.castleEnergy} min={15} max={90} step={1}
                     onChange={(v) => setTweak('castleEnergy', v)} />
        <TweakSlider label="Power-up every" value={t.powerEvery} min={4} max={25} step={1} unit="s"
                     onChange={(v) => setTweak('powerEvery', v)} />
        <TweakSection label="Look" />
        <TweakSlider label="Glow" value={t.glow} min={0} max={2} step={0.1}
                     onChange={(v) => setTweak('glow', v)} />
        <TweakToggle label="Scanlines" value={t.scanlines}
                     onChange={(v) => setTweak('scanlines', v)} />
      </TweaksPanel>
    );
  }
  ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);
</script>
</body>
</html>
