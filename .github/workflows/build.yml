name: Build

# When game code changes, bump the cache-busting version and regenerate the
# single-file standalone bundle, then commit the result back. The bot commit is
# tagged [skip ci] so it doesn't trigger another run.
on:
  push:
    branches: [main]
    paths:
      - 'game/**'
      - 'index.html'
      - 'tools/build.py'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump version + rebuild standalone
        run: python3 tools/build.py

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump cache version + rebuild standalone [skip ci]"
          git push
