<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cortex Clash</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#06060f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #game {
    display: block;
    touch-action: none;
    background: #06060f;
  }
</style>
</head>
<body data-screen-label="Cortex Clash">
<canvas id="game" width="1080" height="1920"></canvas>

<script>
  // Baked-in settings
  window.TWEAKS = {
    speed: 1,
    castleEnergy: 36,
    powerEvery: 9,
    glow: 0.7,
    scanlines: true
  };
  // PWA: offline cache + installability
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

<script src="game/sound.js?v=26"></script>
<script src="game/boards.js?v=26"></script>
<script src="game/engine.js?v=26"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" integrity="sha384-nlUQ8ZqCbvStErob+biJNzSgltf6urV3VGqhfIfzhmg9RXmpeRm76ELw0pYnKlTR" crossorigin="anonymous"></script>
<script src="game/net.js?v=26"></script>
<script src="game/render.js?v=26"></script>
<script src="game/ai.js?v=26"></script>
<script src="game/main.js?v=26"></script>
</body>
</html>
